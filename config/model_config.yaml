# Model Configuration for HIV Drug Resistance in Zimbabwe

hyperparameters:
  RandomForest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 2
    min_samples_leaf: 1
  XGBoost:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
    gamma: 0
    min_child_weight: 1
  LogisticRegression:
    penalty: 'l2'
    C: 1.0
    solver: 'liblinear'
    max_iter: 200
